name: Build BERSAHAJA App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Verify src files
        run: |
          echo "=== Files in src ==="
          dir src
          echo "=== Content check ==="
          Get-Content src\index_easy.html -TotalCount 5

      - name: Build .exe
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: BERSAHAJA-Windows-EXE
          path: dist/*.exe
          retention-days: 30
